name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest

      - name: Syntax check
        run: python -m py_compile src/fv_handler.py src/wisesolar_api.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Check no secrets in diff
        run: |
          git diff origin/main --name-only | while read f; do
            if grep -qiE '(password|secret|token|api_key).*=.*["''][^"'']{8,}' "$f" 2>/dev/null; then
              echo "WARNING: Possible secret in $f"
              exit 1
            fi
          done
