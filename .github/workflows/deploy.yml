name: Deploy to AWS Lambda

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'config/template.yaml'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Build
        run: sam build --template-file config/template.yaml --base-dir .

      - name: SAM Deploy
        run: |
          sam deploy             --no-confirm-changeset             --no-fail-on-empty-changeset             --parameter-overrides               FvUser="${{ secrets.FV_USER }}"               FvPass="${{ secrets.FV_PASS }}"               FvStationId="${{ secrets.FV_STATION_ID }}"             --capabilities CAPABILITY_IAM

      - name: Get Lambda ARN
        id: arn
        run: |
          ARN=
          echo "Lambda ARN: $ARN"
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "Lambda ARN: ${{ steps.arn.outputs.arn }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Collega la Alexa Skill a questo ARN in developer.amazon.com" >> $GITHUB_STEP_SUMMARY
