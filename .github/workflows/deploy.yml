name: Deploy to AWS Lambda

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'config/template.yaml'
      - 'skill-package/**'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Build
        run: sam build --template-file config/template.yaml --base-dir .

      - name: SAM Deploy
        run: |
          sam deploy             --stack-name fv-monitor             --resolve-s3 --no-confirm-changeset             --no-fail-on-empty-changeset             --parameter-overrides               FvUser="${{ secrets.FV_USER }}"               FvPass="${{ secrets.FV_PASS }}"               FvStationId="${{ secrets.FV_STATION_ID }}"             --capabilities CAPABILITY_IAM

      - name: Get Lambda ARN
        id: arn
        run: |
          ARN=$(aws cloudformation describe-stacks --stack-name fv-monitor --query "Stacks[0].Outputs[?OutputKey=='FvFunctionArn'].OutputValue" --output text)
          echo "Lambda ARN: $ARN"
          echo "arn=$ARN" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Stack**: fv-monitor" >> $GITHUB_STEP_SUMMARY
          echo "**Lambda ARN**: \`$ARN\`" >> $GITHUB_STEP_SUMMARY

      - name: Setup ASK CLI
        run: npm install -g ask-cli

      - name: Configure ASK CLI
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << 'CONFIG'
          {
            "profiles": {
              "default": {
                "vendor_id": "${ASK_VENDOR_ID}",
                "oauth_client": {
                  "client_id": "${ASK_CLIENT_ID}",
                  "client_secret": "${ASK_CLIENT_SECRET}"
                }
              }
            }
          }
          CONFIG
          # Expand env vars in the config (GitHub Actions heredoc doesn't expand $ vars with 'CONFIG' quotes)
          python3 -c "
          import json, os
          with open(os.path.expanduser('~/.ask/cli_config')) as f:
              cfg = f.read()
          for k, v in os.environ.items():
              if k.startswith('ASK_'):
                  cfg = cfg.replace('\${' + k + '}', v)
          with open(os.path.expanduser('~/.ask/cli_config'), 'w') as f:
              f.write(cfg)
          "
          echo "ASK CLI configured for vendor: $ASK_VENDOR_ID"
        env:
          ASK_VENDOR_ID: ${{ secrets.ASK_VENDOR_ID }}
          ASK_CLIENT_ID: ${{ secrets.ASK_CLIENT_ID }}
          ASK_CLIENT_SECRET: ${{ secrets.ASK_CLIENT_SECRET }}

      - name: Deploy Alexa Skill Model
        id: ask_deploy
        run: |
          # Generate .ask/config (handles both first-deploy and updates)
          mkdir -p .ask
          if [ -n "${SKILL_ID}" ]; then
            echo "Using existing skill ID: ${SKILL_ID}"
            cat > .ask/config << EOF
          {
            "profiles": {
              "default": {
                "skillId": "${SKILL_ID}",
                "skillMetadata": {
                  "type": "SKILL_PACKAGE"
                }
              }
            }
          }
          EOF
          else
            echo "No SKILL_ID set — will create new skill on first deploy"
          fi

          # Replace Lambda ARN placeholder
          LAMBDA_ARN="${{ steps.arn.outputs.arn }}"
          sed -i "s|LAMBDA_ARN_PLACEHOLDER|${LAMBDA_ARN}|g" skill-package/skill.json
          echo "ARN injected into skill.json"

          # Deploy
          ask deploy --profile default --force
          echo "Skill deploy exit code: $?"

          # Capture new skill ID (first deploy)
          if [ -f .ask/config ]; then
            NEW_SKILL_ID=$(python3 -c "import json; c=json.load(open('.ask/config')); print(c.get('profiles',{}).get('default',{}).get('skillId',''))" 2>/dev/null)
            if [ -n "${NEW_SKILL_ID}" ]; then
              echo "skill_id=${NEW_SKILL_ID}" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Alexa Skill Deployed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Skill ID**: \`${NEW_SKILL_ID}\`" >> $GITHUB_STEP_SUMMARY
              if [ -z "${SKILL_ID}" ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "⚠️ **First deploy!** Save this Skill ID as a GitHub Secret named \`SKILL_ID\`" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          fi
        env:
          SKILL_ID: ${{ secrets.SKILL_ID }}
